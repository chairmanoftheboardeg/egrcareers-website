<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status | Emirates Group Roblox</title>
  <link rel="icon" href="https://i.ibb.co/jPPzN1rz/LOGO-EMIRATES-ROBLOX-compressed.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    .status-card { display: none; }
    .status-card.active { display: block; }
  </style>
</head>
<body class="flex flex-col min-h-screen">

  <nav class="bg-white py-4 px-6 md:px-12 flex justify-between items-center shadow-sm sticky top-0 z-50 border-b-4 border-[#D71A21]">
    <a href="/" class="flex items-center">
      <img src="https://i.ibb.co/jPPzN1rz/LOGO-EMIRATES-ROBLOX-compressed.png" alt="EGR" class="h-10">
      <span class="ml-4 font-bold text-lg tracking-widest uppercase text-[#111827] border-l-2 border-gray-200 pl-4">Careers</span>
    </a>
    <div class="hidden lg:flex space-x-8 text-sm font-bold uppercase tracking-widest text-gray-500">
      <a href="/" class="hover:text-[#111827]">Job Search</a>
      <a href="/departments/" class="hover:text-[#111827]">Departments</a>
      <a href="/status/" class="text-[#D71A21]">Status</a>
    </div>
  </nav>

  <header class="bg-[#111827] py-20 px-6 text-center border-b border-gray-800">
    <div class="max-w-4xl mx-auto text-white">
      <h1 class="text-4xl md:text-5xl font-bold uppercase tracking-tight">Application Status</h1>
    </div>
  </header>

  <main class="flex-grow flex flex-col items-center py-16 px-6">
    <div class="max-w-lg w-full bg-white p-8 border border-gray-200 mb-8">
      <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-3">Enter Discord Username</label>
      <input type="text" id="discord-search" class="w-full px-4 py-3 border border-gray-300 bg-gray-50 focus:bg-white focus:border-[#D71A21] outline-none font-bold text-[#111827] mb-4">
      <button onclick="trackApplication()" id="track-btn" class="w-full bg-[#111827] hover:bg-[#D71A21] text-white font-bold py-3 uppercase tracking-widest text-sm transition-colors">
        Check Status
      </button>
    </div>

    <div id="status-result-container" class="max-w-lg w-full">
      <div id="status-loading" class="status-card text-center py-8 text-gray-400 font-bold uppercase tracking-widest">Searching...</div>
      
      <div id="status-not-found" class="status-card bg-white p-8 border border-gray-200 text-center text-[#D71A21] font-bold uppercase tracking-widest">
        No Application Found
      </div>

      <div id="status-success" class="status-card bg-white border border-gray-200">
        <div id="status-banner" class="p-4 text-center text-white font-bold uppercase tracking-widest text-sm">Status</div>
        <div class="p-8">
          <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Roblox Username</p>
          <h3 id="display-name" class="text-xl font-bold text-[#111827] mb-4">---</h3>
          <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Position</p>
          <p id="display-job" class="font-bold text-gray-700">---</p>
        </div>
      </div>
    </div>
  </main>

  <script>
    async function trackApplication() {
      const searchInput = document.getElementById('discord-search').value.trim();
      if(!searchInput) return;

      document.querySelectorAll('.status-card').forEach(el => el.classList.remove('active'));
      document.getElementById('status-loading').classList.add('active');

      const supabase = window.supabase.createClient('https://zboyabxzhptnxnmofvcz.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpib3lhYnh6aHB0bnhubW9mdmN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk3NjU3MTgsImV4cCI6MjA4NTM0MTcxOH0.2et1T3bQqr-ZzZgx-VWaq3kR0FJDprcAbbWBby6oRys');

      try {
        const { data: app, error } = await supabase.from('egr_applications').select('*').eq('discord_username', searchInput).maybeSingle();
        document.getElementById('status-loading').classList.remove('active');

        if (error || !app) {
          document.getElementById('status-not-found').classList.add('active');
        } else {
          document.getElementById('display-name').innerText = app.roblox_username;
          document.getElementById('display-job').innerText = app.job_title;
          
          const banner = document.getElementById('status-banner');
          banner.innerText = app.status;
          
          if(app.status === 'Pending') banner.className = "p-4 text-center text-white font-bold uppercase tracking-widest text-sm bg-gray-500";
          else if(app.status === 'Under Review') banner.className = "p-4 text-center text-white font-bold uppercase tracking-widest text-sm bg-blue-600";
          else if(app.status === 'Approved') banner.className = "p-4 text-center text-white font-bold uppercase tracking-widest text-sm bg-green-600";
          else if(app.status === 'Denied') banner.className = "p-4 text-center text-white font-bold uppercase tracking-widest text-sm bg-[#D71A21]";

          document.getElementById('status-success').classList.add('active');
        }
      } catch (err) {
        alert("Database error.");
      }
    }
  </script>
</body>
</html>
